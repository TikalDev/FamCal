const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const RECUR_LABELS = { none: "Doesn't repeat", weekly: "Every week", biweekly: "Every 2 weeks", monthly: "Every month", yearly: "Every year" };

// ---------- date helpers ----------
const toKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayKey = () => toKey(new Date());
const parseKey = (k) => { const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d); };
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const startOfWeek = (d) => addDays(d, -d.getDay());
const diffDays = (a,b) => Math.round((parseKey(b) - parseKey(a)) / 86400000);
const fmtTime = (t) => {
  if (!t) return "";
  // tolerate odd separators (some keyboards/locales insert ; or . instead of :)
  const [h,m] = String(t).split(/[:;.,]/).map(Number);
  if (isNaN(h)) return "";
  const ampm = h >= 12 ? "pm" : "am";
  const hr = h % 12 === 0 ? 12 : h % 12;
  return `${hr}:${String(isNaN(m) ? 0 : m).padStart(2,"0")} ${ampm}`;
};
const fmtLong = (k) => { const d = parseKey(k); return `${WEEKDAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`; };
// ordinal day: 1 -> "1st", 2 -> "2nd", 17 -> "17th"
const ordinal = (n) => { const s = ["th","st","nd","rd"], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };
// compact weekday + ordinal, e.g. "Friday 17th"
const fmtDayOrdinal = (k) => { const d = parseKey(k); return `${WEEKDAYS[d.getDay()]} ${ordinal(d.getDate())}`; };
// Build kanban columns: "me" first, then only people who have items.
// itemsFor(memberId) returns that person's items; members is the full list.
function personColumns(members, me, itemsFor) {
  const ordered = [...members].sort((a, b) => (a.id === me ? -1 : b.id === me ? 1 : 0));
  return ordered
    .map((m) => ({ member: m, items: itemsFor(m.id), isMe: m.id === me }))
    .filter((col) => col.items.length > 0);
}
const fmtShort = (k) => { const d = parseKey(k); return `${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`; };
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const peopleOf = (it) => it.memberIds || [];
const digitsOf = (s) => (s || "").replace(/[^\d+]/g, "");

const dueLabel = (k) => {
  if (!k) return "No due date";
  const tk = todayKey();
  if (k === tk) return "Due today";
  if (k === toKey(addDays(new Date(),1))) return "Due tomorrow";
  if (k < tk) return `Overdue · was ${fmtShort(k)}`;
  return `Due ${fmtShort(k)}`;
};

// ---------- recurrence ----------
// A single occurrence's start key for a given recurrence anchor
function occursOn(ev, k) {
  // multi-day span: event covers date..endDate inclusive (non-recurring spans)
  if (ev.endDate && ev.endDate > ev.date && (!ev.recur || ev.recur === "none")) {
    return k >= ev.date && k <= ev.endDate;
  }
  if (ev.date === k) return true;
  if (!ev.recur || ev.recur === "none" || k < ev.date) return false;
  const n = diffDays(ev.date, k);
  if (ev.recur === "weekly") return n % 7 === 0;
  if (ev.recur === "biweekly") return n % 14 === 0;
  const a = parseKey(ev.date), b = parseKey(k);
  if (ev.recur === "monthly") return a.getDate() === b.getDate();
  if (ev.recur === "yearly") return a.getDate() === b.getDate() && a.getMonth() === b.getMonth();
  return false;
}
// position of dayKey within a multi-day span: "start" | "mid" | "end" | "single" | null
function spanPos(ev, k) {
  if (!ev.endDate || ev.endDate <= ev.date || (ev.recur && ev.recur !== "none")) return "single";
  if (k === ev.date) return "start";
  if (k === ev.endDate) return "end";
  if (k > ev.date && k < ev.endDate) return "mid";
  return null;
}
// map of dayKey -> occurrences (with date swapped to the occurrence day)
function eventsMapForRange(events, startK, endK) {
  const map = {};
  let d = parseKey(startK);
  const end = parseKey(endK);
  while (d <= end) {
    const k = toKey(d);
    for (const ev of events) {
      if (occursOn(ev, k)) (map[k] ||= []).push({ ...ev, date: k, seriesDate: ev.date, _span: spanPos(ev, k) });
    }
    if (map[k]) map[k].sort((a,b) => ((a.time||"99") < (b.time||"99") ? -1 : 1));
    d = addDays(d, 1);
  }
  return map;
}

// ---------- chore scheduling & rotation ----------
// A chore's schedule:
//   cadence: "daily" | "weekly" | "biweekly" | "monthly"
//   weekdays: array of 0-6 (Sun..Sat) for weekly/biweekly (defaults to whole week if empty)
//   monthDay: 1-31 for monthly
// "period" = a stable occurrence counter used both for done-tracking and rotation.
const ANCHOR = "2020-01-05"; // a Sunday, reference point

// does this chore occur on dateK?
const occursOnChore = (chore, dateK) => {
  const d = parseKey(dateK);
  const cad = chore.cadence || "weekly";
  if (cad === "daily") return true;
  if (cad === "monthly") {
    const md = chore.monthDay || 1;
    return d.getDate() === md;
  }
  // weekly / biweekly: must match a selected weekday
  const wds = (chore.weekdays && chore.weekdays.length) ? chore.weekdays : [0,1,2,3,4,5,6];
  if (!wds.includes(d.getDay())) return false;
  if (cad === "biweekly") {
    // alternate weeks based on week number from anchor
    const wk = Math.floor(diffDays(ANCHOR, dateK) / 7);
    return wk % 2 === 0;
  }
  return true; // weekly
};

// occurrence index: how many times this chore has come due, up to & including dateK.
const periodOf = (chore, dateK = todayKey()) => {
  const cad = chore.cadence || "weekly";
  if (cad === "daily") return diffDays("2020-01-01", dateK);
  if (cad === "monthly") {
    const d = parseKey(dateK);
    return d.getFullYear() * 12 + d.getMonth(); // month index
  }
  // weekly/biweekly: count matching occurrence-days from anchor up to dateK, computed directly
  const wds = (chore.weekdays && chore.weekdays.length) ? chore.weekdays : [0,1,2,3,4,5,6];
  const total = diffDays(ANCHOR, dateK);
  if (total < 0) return 0;
  const anchorDow = parseKey(ANCHOR).getDay(); // Sunday = 0
  const fullWeeks = Math.floor((total + 1) / 7);
  const remDays = (total + 1) % 7;             // leftover days in the partial week
  if (cad === "weekly") {
    let count = fullWeeks * wds.length;
    for (let i = 0; i < remDays; i++) { if (wds.includes((anchorDow + i) % 7)) count++; }
    return count;
  }
  // biweekly: only weeks where weekNumber is even count
  let count = 0;
  const evenFullWeeks = Math.ceil(fullWeeks / 2); // weeks 0,2,4... among 0..fullWeeks-1
  count = evenFullWeeks * wds.length;
  // partial (current) week counts only if its week number is even
  const curWeek = Math.floor(total / 7);
  if (curWeek % 2 === 0) {
    for (let i = 0; i < remDays; i++) { if (wds.includes((anchorDow + i) % 7)) count++; }
  }
  return count;
};

const whoseTurn = (chore, dateK = todayKey()) => {
  const order = chore.memberIds || [];
  if (!order.length) return null;
  const p = periodOf(chore, dateK);
  const offset = (((p - (chore.anchorPeriod || 0)) % order.length) + order.length) % order.length;
  return order[((chore.anchorIndex || 0) + offset) % order.length];
};
const choreDoneThisPeriod = (chore) => chore.lastDone && chore.lastDone.period === periodOf(chore);

const WEEKDAY_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const cadenceLabel = (c) => {
  const cad = c.cadence || (typeof c === "string" ? c : "weekly");
  // support being called with a chore object or a plain cadence string (legacy)
  if (typeof c === "string") return c === "daily" ? "Every day" : "Every week";
  if (cad === "daily") return "Every day";
  if (cad === "monthly") return `Monthly on the ${ordinal(c.monthDay || 1)}`;
  const wds = (c.weekdays && c.weekdays.length) ? c.weekdays : null;
  const dayList = wds ? wds.slice().sort().map((n) => WEEKDAYS[n]).join(", ") : "every day";
  return `${cad === "biweekly" ? "Every other week" : "Weekly"} · ${dayList}`;
};


// ---------- shopping / favorites ----------
const money = (n) => (n == null || n === "" ? "" : `$${Number(n).toFixed(2)}`);
const lastBuy = (fav) => (fav.history && fav.history.length ? fav.history[fav.history.length - 1] : null);
const cheapestBuy = (fav) => {
  const withPrice = (fav.history || []).filter((h) => h.price != null && h.price !== "");
  if (!withPrice.length) return null;
  return withPrice.reduce((best, h) => (Number(h.price) < Number(best.price) ? h : best));
};
const priceHint = (fav) => {
  if (!fav) return "";
  const last = lastBuy(fav), cheap = cheapestBuy(fav);
  const bits = [];
  if (last) bits.push(`Last: ${money(last.price)}${last.store ? ` ${last.store}` : ""}`.trim());
  if (cheap && (!last || cheap.store !== last.store || cheap.price !== last.price)) {
    bits.push(`Cheapest: ${money(cheap.price)}${cheap.store ? ` ${cheap.store}` : ""}`.trim());
  }
  return bits.join(" · ");
};

// ---------- supabase row <-> app object ----------
const rowToEvent = (r) => ({ id: r.id, title: r.title, date: r.date, endDate: r.end_date || "", time: r.time || "", notes: r.notes || "", phone: r.phone || "", location: r.location || "", recur: r.recur || "none", memberIds: r.member_ids || [], doneOn: r.done_on || [], cleared: !!r.cleared, ts: r.ts, by: r.by_member, visibility: "family" });
const eventToRow = (e) => ({ id: e.id, title: e.title, date: e.date, end_date: e.endDate || null, time: e.time || null, notes: e.notes || null, phone: e.phone || null, location: e.location || null, recur: e.recur || "none", member_ids: e.memberIds, done_on: e.doneOn || [], cleared: !!e.cleared, ts: e.ts, by_member: e.by || null });

const taskToRow = (t) => ({ id: t.id, title: t.title, due_date: t.dueDate || null, notes: t.notes || null, done: !!t.done, cleared: !!t.cleared, member_ids: t.memberIds, ts: t.ts, by_member: t.by || null });

const rowToFav = (r) => ({ id: r.id, name: r.name, history: r.history || [] });
const favToRow = (f) => ({ id: f.id, name: f.name, history: f.history || [] });

const purchaseToRow = (p) => ({ id: p.id, name: p.name, store: p.store || null, price: (p.price === "" || p.price == null) ? null : Number(p.price), date: p.date, by_member: p.by || null, fav_id: p.favId || null });

function App() {

  const [events, setEvents] = useState([]);         // shared events

  const [weekAnchor, setWeekAnchor] = useState(() => toKey(startOfWeek(new Date())));
  const [dayAnchor, setDayAnchor] = useState(() => todayKey());
  const [selectedDay, setSelectedDay] = useState(null);
  const [detail, setDetail] = useState(null);
  const [editing, setEditing] = useState(null);
  const [taskEditing, setTaskEditing] = useState(null);
  const [choreEditing, setChoreEditing] = useState(null);
  const [shopEditing, setShopEditing] = useState(null);
  const [favManage, setFavManage] = useState(false);
  const [historyView, setHistoryView] = useState(false);
  const [clearedView, setClearedView] = useState(null);  // null | 'task' | 'event' | 'chore'
  const [addChoosing, setAddChoosing] = useState(false);
  const [famEditing, setFamEditing] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [monthCollapsed, setMonthCollapsed] = useState(false);   // hide the month grid, keep lists
  const [summaryLayout, setSummaryLayout] = useState(lsGet("famcal:summaryLayout") || "stacked"); // "stacked" | "columns"
  const setSummaryLayoutSaved = (v) => { setSummaryLayout(v); lsSet("famcal:summaryLayout", v); };
  const [pastEventsOpen, setPastEventsOpen] = useState(false);   // past-events history sheet
  const [notifOn, setNotifOn] = useState(false);   // reflects OneSignal opt-in state
  const [syncing, setSyncing] = useState(false);
  const [offline, setOffline] = useState(false);

  // ---- fetch everything ----
  const fetchAll = useCallback(async () => {
    try {
      const [f, e, t, c, sh, fv, pu, cl] = await Promise.all([
        sb.from("family").select("*").eq("id", 1).maybeSingle(),
        sb.from("events").select("*"),
        sb.from("tasks").select("*"),
        sb.from("chores").select("*"),
        sb.from("shop").select("*"),
        sb.from("favorites").select("*"),
        sb.from("purchases").select("*"),
        sb.from("cleared_history").select("*"),
      ]);
      if (f.error || e.error || t.error || c.error || sh.error || fv.error || pu.error || cl.error) throw (f.error || e.error || t.error || c.error || sh.error || fv.error || pu.error || cl.error);
      setFam(f.data ? { name: f.data.name, members: f.data.members || [], passcode: f.data.passcode || null, adminPin: f.data.admin_pin || null } : null);
      setEvents((e.data || []).map(rowToEvent));
      setTasks((t.data || []).map(rowToTask));
      setChores((c.data || []).map(rowToChore));
      setShop((sh.data || []).map(rowToShop));
      setFavorites((fv.data || []).map(rowToFav));
      setPurchases((pu.data || []).map(rowToPurchase));
      setCleared((cl.data || []).map(rowToCleared));
      setOffline(false);
    } catch (err) {
      console.error("fetch failed", err);
      setOffline(true);
      if (fam === undefined) setFam(null);
    }
  }, []);

  useEffect(() => {
    fetchAll();
    const ch = sb.channel("famcal")
      .on("postgres_changes", { event: "*", schema: "public" }, () => fetchAll())
      .subscribe();
    const iv = setInterval(fetchAll, POLL_MS);
    const onVis = () => { if (document.visibilityState === "visible") fetchAll(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { sb.removeChannel(ch); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  }, [fetchAll]);

  // first visit: start the "new for you" clock now
  useEffect(() => {
    if (lastSeen === null) { const now = Date.now(); setLastSeen(now); lsSet("famcal:seen", now); }
  }, []);

  const pickMe = (id) => {
    setMe(id);
    lsSet("famcal:me", id);
    // tag this device's push subscription with who they are, so notifications
    // can target the right people (and skip whoever made a change)
    tagPushMember(id);
  };
  // apply OneSignal tags for a member id (safe to call anytime; waits for SDK)
  const tagPushMember = (id) => {
    const mem = (fam?.members || []).find((m) => m.id === id);
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      try {
        await OneSignal.User.addTags({
          member_id: id || "",
          member_name: mem ? mem.name : "",
        });
      } catch (e) { /* ignore if not subscribed yet */ }
    });
  };
  const markSeen = () => { const now = Date.now(); setLastSeen(now); lsSet("famcal:seen", now); };

  // ----- notifications on/off (drives OneSignal opt-in from our menu) -----
  // read current subscription state into notifOn
  useEffect(() => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      try {
        const optedIn = OneSignal.User?.PushSubscription?.optedIn;
        setNotifOn(!!optedIn);
        // keep the toggle in sync if it changes
        OneSignal.User.PushSubscription.addEventListener("change", (e) => {
          setNotifOn(!!(e?.current?.optedIn));
        });
      } catch (e) {}
    });
  }, []);

  const enableNotifications = () => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      try {
        // ask permission if not granted, then opt in
        if (OneSignal.Notifications.permission !== true) {
          await OneSignal.Notifications.requestPermission();
        }
        await OneSignal.User.PushSubscription.optIn();
        if (me) tagPushMember(me);      // re-tag who this device is
        setNotifOn(true);
      } catch (e) {}
    });
  };
  const disableNotifications = () => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      try { await OneSignal.User.PushSubscription.optOut(); setNotifOn(false); } catch (e) {}
    });
  };

  // Fire a push to everyone EXCEPT the person who made the change.
  // Calls our Supabase Edge Function (which holds the OneSignal secret).
  const pushNotify = async (title, message) => {
    try {
      await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ title, message, excludeMemberId: me || null }),
      });
    } catch (e) { /* notifications are best-effort; never block the save */ }
  };

  // if already identified on load, (re)apply the push tags once fam is known
  useEffect(() => {
    if (me && fam?.members?.length) tagPushMember(me);
    // eslint-disable-next-line
  }, [me, fam]);

  // ---- writes ----
  const saveFamily = async (f) => {
    setSyncing(true);
    const { error } = await sb.from("family").upsert({ id: 1, name: f.name, members: f.members, passcode: f.passcode || null, admin_pin: f.adminPin || null });
    if (error) console.error(error);
    await fetchAll();
    setSyncing(false);
  };

  const saveEvent = async (evIn) => {
    setSyncing(true);
    const ev = { ...evIn, ts: Date.now(), by: me || evIn.by || null };
    const isPrivate = ev.visibility === "private";
    const wasShared = events.some((e) => e.id === ev.id);
    const wasPrivate = privEvents.some((e) => e.id === ev.id);
    const isNewShared = !isPrivate && !wasShared && !wasPrivate;
    if (isPrivate) {
      const next = wasPrivate ? privEvents.map((e) => (e.id === ev.id ? ev : e)) : [...privEvents, ev];
      setPrivEvents(next); lsSet("famcal:private", next);
      if (wasShared) await sb.from("events").delete().eq("id", ev.id);
    } else {
      await sb.from("events").upsert(eventToRow(ev));
      if (wasPrivate) { const next = privEvents.filter((e) => e.id !== ev.id); setPrivEvents(next); lsSet("famcal:private", next); }
    }
    await fetchAll();
    setSyncing(false);
    setEditing(null); setDetail(null);
    // notify the family about a newly-added shared event
    if (isNewShared) {
      const meName = (fam?.members || []).find((m) => m.id === me)?.name || "Someone";
      const when = ev.date ? fmtShort(ev.date) : "";
      pushNotify("New event", `${meName} added "${ev.title}"${when ? ` on ${when}` : ""}`);
    }
  };

  const deleteEvent = async (id) => {
    setSyncing(true);
    if (privEvents.some((e) => e.id === id)) {
      const next = privEvents.filter((e) => e.id !== id); setPrivEvents(next); lsSet("famcal:private", next);
    } else {
      await sb.from("events").delete().eq("id", id);
      await fetchAll();
    }
    setSyncing(false);
    setEditing(null); setDetail(null);
  };

  const saveTask = async (tIn) => {
    setSyncing(true);
    const isNew = !tasks.some((x) => x.id === tIn.id);
    const t = { ...tIn, ts: Date.now(), by: me || tIn.by || null };
    await sb.from("tasks").upsert(taskToRow(t));
    await fetchAll();
    setSyncing(false);
    setTaskEditing(null);
    if (isNew) {
      const meName = (fam?.members || []).find((m) => m.id === me)?.name || "Someone";
      pushNotify("New task", `${meName} added a task: "${t.title}"`);
    }
  };
  const deleteTask = async (id) => {
    setSyncing(true);
    await sb.from("tasks").delete().eq("id", id);
    await fetchAll();
    setSyncing(false);
    setTaskEditing(null);
  };
  const toggleTask = async (id) => {
    const t = tasks.find((x) => x.id === id);
    if (!t) return;
    // optimistic flip so the checkbox feels instant
    setTasks((list) => list.map((x) => (x.id === id ? { ...x, done: !x.done } : x)));
    await sb.from("tasks").update({ done: !t.done, ts: Date.now(), by_member: me || t.by || null }).eq("id", id);
    fetchAll();
  };

  const saveChore = async (cIn) => {
    setSyncing(true);
    const isNew = !chores.some((c) => c.id === cIn.id);
    // anchor rotation to the chore's FIRST upcoming occurrence, so person #1 gets the first turn
    const firstOccurrencePeriod = (chore) => {
      const tk = todayKey();
      if (occursOnChore(chore, tk)) return periodOf(chore, tk);
      for (let i = 1; i <= 366; i++) {
        const k = toKey(addDays(new Date(), i));
        if (occursOnChore(chore, k)) return periodOf(chore, k);
      }
      return periodOf(chore, tk);
    };
    const c = isNew
      ? { ...cIn, anchorPeriod: firstOccurrencePeriod(cIn), anchorIndex: 0, lastDone: null, ts: Date.now(), by: me || null }
      : { ...cIn, ts: Date.now(), by: me || cIn.by || null };
    await sb.from("chores").upsert(choreToRow(c));
    await fetchAll();
    setSyncing(false);
    setChoreEditing(null);
    if (isNew) {
      const meName = (fam?.members || []).find((m) => m.id === me)?.name || "Someone";
      pushNotify("New chore", `${meName} set up a chore: "${c.title}"`);
    }
  };
  const deleteChore = async (id) => {
    setSyncing(true);
    await sb.from("chores").delete().eq("id", id);
    await fetchAll();
    setSyncing(false);
    setChoreEditing(null);
  };
  const completeChore = async (id) => {
    const c = chores.find((x) => x.id === id);
    if (!c) return;
    const p = periodOf(c);
    const already = c.lastDone && c.lastDone.period === p;
    const lastDone = already ? null : { period: p, by: whoseTurn(c) };
    setChores((list) => list.map((x) => (x.id === id ? { ...x, lastDone } : x))); // optimistic
    await sb.from("chores").update({ last_done: lastDone, ts: Date.now(), by_member: me || c.by || null }).eq("id", id);
    fetchAll();
  };

  // ----- swipe-to-clear (only on already-done items) + cleared history -----
  const logCleared = (kind, refId, title, detail, memberIds) =>
    sb.from("cleared_history").insert(clearedToRow({
      id: uid(), kind, refId, title, detail: detail || "", memberIds: memberIds || [],
      clearedAt: Date.now(), by: me || null,
    }));

  // task: must be done. one-off, so it's gone (cleared=true) after logging.
  const clearTask = async (id) => {
    const t = tasks.find((x) => x.id === id);
    if (!t || !t.done) return;
    setSyncing(true);
    await logCleared("task", t.id, t.title, dueLabel(t.dueDate), t.memberIds);
    await sb.from("tasks").update({ cleared: true }).eq("id", id);
    await fetchAll(); setSyncing(false);
  };

  // event occurrence: only when this date is marked done. recurring events
  // reappear on their next occurrence automatically; one-off events get cleared.
  const clearEventOccurrence = async (ev) => {
    const dateK = ev.date; // the occurrence day
    const isDone = (ev.doneOn || []).includes(dateK);
    if (!isDone) return;
    setSyncing(true);
    const recurring = ev.recur && ev.recur !== "none";
    await logCleared("event", ev.id, ev.title, fmtLong(dateK), ev.memberIds);
    if (recurring) {
      // keep the series, just drop this date from doneOn so it's tidy;
      // the next occurrence shows normally.
      const nextDoneOn = (ev.doneOn || []).filter((d) => d !== dateK);
      await sb.from("events").update({ done_on: nextDoneOn }).eq("id", ev.id);
    } else {
      await sb.from("events").update({ cleared: true }).eq("id", ev.id);
    }
    await fetchAll(); setSyncing(false);
  };
  // mark/unmark an event occurrence done (per date)
  const toggleEventDone = async (ev) => {
    const dateK = ev.date;
    const cur = ev.doneOn || [];
    const nextDoneOn = cur.includes(dateK) ? cur.filter((d) => d !== dateK) : [...cur, dateK];
    setEvents((list) => list.map((x) => (x.id === ev.id ? { ...x, doneOn: nextDoneOn } : x)));
    await sb.from("events").update({ done_on: nextDoneOn }).eq("id", ev.id);
    fetchAll();
  };
  // one tap: mark done AND clear it into Past events (recurring returns next time)
  const markEventDoneAndClear = async (ev) => {
    const dateK = ev.date;
    setSyncing(true);
    const recurring = ev.recur && ev.recur !== "none";
    await logCleared("event", ev.id, ev.title, fmtLong(dateK), ev.memberIds);
    if (recurring) {
      const nextDoneOn = (ev.doneOn || []).filter((d) => d !== dateK);
      await sb.from("events").update({ done_on: nextDoneOn }).eq("id", ev.id);
    } else {
      await sb.from("events").update({ cleared: true }).eq("id", ev.id);
    }
    await fetchAll(); setSyncing(false);
  };

  // chore: only when done this period. recurring by nature — reappears next period.
  const clearChore = async (id) => {
    const c = chores.find((x) => x.id === id);
    if (!c) return;
    const p = periodOf(c);
    const doneThis = c.lastDone && c.lastDone.period === p;
    if (!doneThis) return;
    const turnMember = (fam?.members || []).find((m) => m.id === whoseTurn(c));
    setSyncing(true);
    await logCleared("chore", c.id, c.title, turnMember ? `${turnMember.name}'s turn` : cadenceLabel(c), c.memberIds);
    await sb.from("chores").update({ cleared_period: p }).eq("id", id);
    await fetchAll(); setSyncing(false);
  };

  const deleteCleared = async (id) => {
    await sb.from("cleared_history").delete().eq("id", id);
    fetchAll();
  };
  const clearAllCleared = async (kind) => {
    setSyncing(true);
    await sb.from("cleared_history").delete().eq("kind", kind);
    await fetchAll(); setSyncing(false);
  };

  // ----- shopping -----
  const addShopItem = async (item) => {
    setSyncing(true);
    const row = shopToRow({ id: uid(), name: item.name.trim(), store: item.store, price: item.price, favId: item.favId || null, checked: false, ts: Date.now(), by: me || null });
    await sb.from("shop").insert(row);
    await fetchAll(); setSyncing(false); setShopEditing(null);
  };
  const editShopItem = async (item) => {
    setSyncing(true);
    await sb.from("shop").upsert(shopToRow({ ...item, ts: Date.now(), by: me || item.by || null }));
    await fetchAll(); setSyncing(false); setShopEditing(null);
  };
  const toggleShopChecked = async (id) => {
    const s = shop.find((x) => x.id === id); if (!s) return;
    setShop((list) => list.map((x) => (x.id === id ? { ...x, checked: !x.checked } : x)));
    await sb.from("shop").update({ checked: !s.checked }).eq("id", id);
    fetchAll();
  };
  const removeShopItem = async (id) => {
    setSyncing(true);
    await sb.from("shop").delete().eq("id", id);
    await fetchAll(); setSyncing(false); setShopEditing(null);
  };
  // record a bought item into purchase history + its favorite's price memory, then remove it
  const recordBuy = async (item) => {
    await sb.from("purchases").insert(purchaseToRow({
      id: uid(), name: item.name, store: item.store || "",
      price: item.price, date: todayKey(), by: me || null, favId: item.favId || null,
    }));
    if (item.favId) {
      const fav = favorites.find((f) => f.id === item.favId);
      if (fav) {
        const history = [...(fav.history || []), { store: item.store || "", price: (item.price === "" || item.price == null) ? "" : Number(item.price), date: todayKey() }];
        await sb.from("favorites").update({ history }).eq("id", fav.id);
      }
    }
    await sb.from("shop").delete().eq("id", item.id);
  };
  const clearCheckedShop = async () => {
    const checked = shop.filter((s) => s.checked);
    if (checked.length === 0) return;
    setSyncing(true);
    for (const item of checked) await recordBuy(item);
    await fetchAll(); setSyncing(false);
  };
  const deletePurchase = async (id) => {
    await sb.from("purchases").delete().eq("id", id);
    fetchAll();
  };
  const clearAllPurchases = async () => {
    setSyncing(true);
    await sb.from("purchases").delete().neq("id", "");
    await fetchAll(); setSyncing(false);
  };
  const readdFromHistory = async (p) => {
    if (shop.some((s) => s.name.toLowerCase() === p.name.toLowerCase())) return;
    const fav = favorites.find((f) => f.name.toLowerCase() === p.name.toLowerCase());
    await sb.from("shop").insert(shopToRow({
      id: uid(), name: p.name, store: "", price: "",
      favId: fav ? fav.id : null, lastStore: p.store || "", lastPrice: p.price ?? "",
      checked: false, ts: Date.now(), by: me || null,
    }));
    fetchAll();
  };

  // ----- favorites -----
  const addFavorite = async (name) => {
    if (favorites.some((f) => f.name.toLowerCase() === name.trim().toLowerCase())) return;
    await sb.from("favorites").insert(favToRow({ id: uid(), name: name.trim(), history: [] }));
    fetchAll();
  };
  const saveItemAsFavorite = async (item) => {
    let fav = favorites.find((f) => f.name.toLowerCase() === item.name.trim().toLowerCase());
    if (!fav) {
      fav = { id: uid(), name: item.name.trim(), history: [] };
      await sb.from("favorites").insert(favToRow(fav));
    }
    await sb.from("shop").update({ fav_id: fav.id }).eq("id", item.id);
    fetchAll();
  };
  const removeFavorite = async (id) => {
    await sb.from("favorites").delete().eq("id", id);
    fetchAll();
  };
  const addFavoriteToList = async (fav) => {
    if (shop.some((s) => s.favId === fav.id)) return;
    const last = lastBuy(fav);
    await sb.from("shop").insert(shopToRow({ id: uid(), name: fav.name, store: last?.store || "", price: "", favId: fav.id, checked: false, ts: Date.now(), by: me || null }));
    fetchAll();
  };

  // ---- loading / setup / lock gates ----
  if (fam === undefined) return <Shell><p className="text-center text-slate-400 py-20 text-sm">Opening the calendar…</p></Shell>;
  if (fam === null) return <Setup onDone={saveFamily} offline={offline} />;
  if (fam.passcode && unlockedWith !== fam.passcode) {
    return <Lock familyName={fam.name} passcode={fam.passcode} onUnlock={(p) => { setUnlockedWith(p); lsSet("famcal:unlock", p); }} />;
  }

  const memberById = Object.fromEntries(fam.members.map((m) => [m.id, m]));
  // colours of everyone on an item (falls back to grey)
  const colorsOf = (ev) => {
    const cs = peopleOf(ev).map((id) => (memberById[id] || {}).color).filter(Boolean);
    return cs.length ? cs : ["#94a3b8"];
  };
  const colorOf = (ev) => colorsOf(ev)[0];
  // CSS background: solid for one person, gradient blend for several
  const bgOf = (ev) => {
    const cs = colorsOf(ev);
    if (cs.length === 1) return cs[0];
    const stops = cs.map((c, i) => `${c} ${Math.round((i / (cs.length - 1)) * 100)}%`).join(", ");
    return `linear-gradient(135deg, ${stops})`;
  };
  // hide events swiped away (one-off cleared ones); recurring ones stay
  const allEvents = [...events.filter((e) => !e.cleared), ...privEvents];
  const tk = todayKey();

  // tasks that are swiped-cleared drop off entirely
  const activeTasks = tasks.filter((t) => !t.cleared);
  const openTasks = activeTasks.filter((t) => !t.done).sort((a,b) => ((a.dueDate||"9999") < (b.dueDate||"9999") ? -1 : 1));
  const doneTasks = activeTasks.filter((t) => t.done);
  // chores swiped away this period drop off until next period
  const activeChores = chores.filter((c) => !(c.clearedPeriod != null && c.clearedPeriod === periodOf(c)));

  const newForMe = (me && lastSeen)
    ? [...allEvents, ...tasks].filter((it) => it.ts && it.ts > lastSeen && it.by && it.by !== me && peopleOf(it).includes(me))
    : [];

  const todaysEvents = eventsMapForRange(allEvents, tk, tk)[tk] || [];
  const todaysTasks = openTasks.filter((t) => t.dueDate && t.dueDate <= tk);

  const section = CALENDAR_VIEWS.includes(view) ? "calendar" : view;
  const headerTitle =
    view === "month" ? `${MONTHS[cursor.m]} ${cursor.y}`
    : view === "week" ? `${MONTHS[parseKey(weekAnchor).getMonth()]} ${parseKey(weekAnchor).getFullYear()}`
    : view === "day" ? `${MONTHS[parseKey(dayAnchor).getMonth()]} ${parseKey(dayAnchor).getFullYear()}`
    : view === "tasks" ? "To-do list"
    : view === "chores" ? "Chore rotation"
    : view === "shop" ? "Shopping list"
    : "Family board";

  const openNew = (dayKey, memberId) => {
    setSelectedDay(dayKey || selectedDay || (view === "day" ? dayAnchor : tk));
    setDetail(null);
    setEditing({ __new: true, presetMember: memberId || null });
  };
  const openDay = (k) => { if (view === "day") setDayAnchor(k); else setSelectedDay(k); };

  const taskSummary = (
    <TaskSummary openTasks={openTasks} doneCount={doneTasks.length} memberById={memberById} members={fam.members} me={me}
      layout={summaryLayout} onSetLayout={setSummaryLayoutSaved}
      onToggle={toggleTask} onOpenAll={() => setView("tasks")} onEdit={setTaskEditing} />
  );
  const choreSummary = (
    <ChoreSummary chores={activeChores} memberById={memberById} members={fam.members} me={me}
      layout={summaryLayout} onSetLayout={setSummaryLayoutSaved}
      onComplete={completeChore} onClear={clearChore} onOpenAll={() => setView("chores")} onEdit={setChoreEditing} />
  );
  const shopSummary = (
    <ShopSummary shop={shop} onOpenAll={() => setView("shop")} onToggle={toggleShopChecked} />
  );

  return (
    <Shell>
      {/* header */}
      <header className="flex items-end justify-between gap-3 px-4 pt-5 pb-3">
        <div>
          <p className="text-xs font-semibold tracking-widest uppercase text-teal-700">{fam.name}</p>
          <h1 className="text-2xl font-bold text-slate-800 leading-tight">{headerTitle}</h1>
        </div>
        <div className="flex items-center gap-2 pb-1">
          {offline && <span className="text-[10px] font-bold text-red-500">offline</span>}
          <span className={`w-2 h-2 rounded-full ${syncing ? "bg-amber-400" : "bg-emerald-400"}`} title={syncing ? "Saving…" : "Synced"} />
          <button onClick={() => setMenuOpen(true)} className="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center" aria-label="Menu">
            <span className="text-lg leading-none">☰</span>
          </button>
        </div>
      </header>

      {/* section toggle (top level) */}
      <div className="px-4 pb-2 overflow-x-auto">
        <div className="flex rounded-full bg-slate-200 p-0.5 text-xs font-semibold w-fit whitespace-nowrap">
          {[["calendar","Calendar"],["tasks","Tasks"],["chores","Chores"],["shop","Shopping"]].map(([sec,label]) => {
            const active = section === sec;
            const go = () => setView(sec === "calendar" ? (CALENDAR_VIEWS.includes(view) ? view : "month") : sec);
            return (
              <button key={sec} onClick={go}
                className={`px-3.5 py-1.5 rounded-full transition-colors ${active ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>
                {label}
                {sec === "tasks" && openTasks.length > 0 && (
                  <span className="ml-1 px-1.5 py-0.5 rounded-full bg-teal-700 text-white text-[9px] align-middle">{openTasks.length}</span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* calendar sub-views (only when in Calendar section) */}
      {section === "calendar" && (
        <div className="px-4 pb-3 overflow-x-auto">
          <div className="flex gap-1 text-xs font-semibold w-fit whitespace-nowrap">
            {[["month","Month"],["week","Week"],["day","Day"],["board","Board"]].map(([v,label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`px-3 py-1 rounded-lg transition-colors ${view === v ? "bg-teal-700 text-white" : "bg-slate-100 text-slate-500"}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* "new for you" alert */}
      {newForMe.length > 0 && (
        <div className="mx-4 mb-3 rounded-2xl border border-amber-300 bg-amber-50 p-3">
          <div className="flex items-start gap-2.5">
            <span className="text-lg leading-none pt-0.5">🔔</span>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-bold text-amber-900">New for you</p>
              <ul className="pt-0.5">
                {newForMe.slice(0,3).map((it) => (
                  <li key={it.id} className="text-xs text-amber-800 truncate">
                    {"done" in it ? "✅" : "📅"} {it.title}
                    {it.date ? ` · ${fmtShort(it.date)}` : it.dueDate ? ` · ${dueLabel(it.dueDate)}` : ""}
                  </li>
                ))}
                {newForMe.length > 3 && <li className="text-xs text-amber-700 font-semibold">+{newForMe.length - 3} more</li>}
              </ul>
            </div>
            <button onClick={markSeen} className="shrink-0 px-3 py-1.5 rounded-lg bg-amber-200/70 text-amber-900 text-xs font-bold">Got it</button>
          </div>
        </div>
      )}

      {/* today strip */}
      {(todaysEvents.length > 0 || todaysTasks.length > 0) && view !== "day" && (
        <Collapsible storeKey="famcal:collapse:today" title="Today"
          count={todaysEvents.length + todaysTasks.length} className="px-4 pb-3">
          <div className="flex gap-2 overflow-x-auto pb-1">
            {todaysEvents.map((ev) => (
              <button key={ev.id + ev.date} onClick={() => setDetail(ev)}
                className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-white border border-slate-200 whitespace-nowrap shrink-0 active:bg-slate-50">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: bgOf(ev) }} />
                <span className="text-xs font-semibold text-slate-800">{ev.title}</span>
                {ev.time && <span className="text-[10px] text-slate-500">{fmtTime(ev.time)}</span>}
              </button>
            ))}
            {todaysTasks.map((t) => (
              <button key={t.id} onClick={() => setTaskEditing(t)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-xl border whitespace-nowrap shrink-0 active:bg-slate-50 ${t.dueDate < tk ? "bg-red-50 border-red-200" : "bg-white border-slate-200"}`}>
                <span className="text-xs">✅</span>
                <span className="text-xs font-semibold text-slate-800">{t.title}</span>
                {t.dueDate < tk && <span className="text-[10px] font-bold text-red-500">overdue</span>}
              </button>
            ))}
          </div>
        </Collapsible>
      )}

      {view === "month" && (<>
        <div className="px-4 pb-2 flex justify-end">
          <button onClick={() => setMonthCollapsed((c) => !c)} className="text-xs font-semibold text-teal-700">
            {monthCollapsed ? "Show calendar" : "Hide calendar — show lists only"}
          </button>
        </div>
        {!monthCollapsed && (
          <MonthGrid cursor={cursor} setCursor={setCursor} allEvents={allEvents} colorOf={colorOf} bgOf={bgOf} onPickDay={openDay} onDetail={setDetail} />
        )}
        {taskSummary}
        {choreSummary}
        {shopSummary}
        <div className="pb-24" />
      </>)}
      {view === "week" && (<>
        <WeekView weekAnchor={weekAnchor} setWeekAnchor={setWeekAnchor} allEvents={allEvents} colorOf={colorOf} bgOf={bgOf} onPick={openDay} onDetail={setDetail} />
        {taskSummary}
        {choreSummary}
        {shopSummary}
        <div className="pb-24" />
      </>)}
      {view === "day" && (<>
        <DayView dayAnchor={dayAnchor} setDayAnchor={setDayAnchor} allEvents={allEvents} memberById={memberById} colorOf={colorOf} bgOf={bgOf}
          onDetail={setDetail} onAdd={() => openNew(dayAnchor)} />
        {taskSummary}
        {choreSummary}
        {shopSummary}
        <div className="pb-24" />
      </>)}
      {view === "tasks" && (
        <TasksView openTasks={openTasks} doneTasks={doneTasks} memberById={memberById} members={fam.members} me={me}
          onToggle={toggleTask} onEdit={setTaskEditing} onClear={clearTask}
          onHistory={() => setClearedView("task")} historyCount={cleared.filter((h) => h.kind === "task").length} />
      )}
      {view === "chores" && (
        <ChoresView chores={activeChores} memberById={memberById} members={fam.members} me={me} onComplete={completeChore} onClear={clearChore} onEdit={setChoreEditing}
          clearedChores={cleared.filter((h) => h.kind === "chore")} onDeleteCleared={deleteCleared} onClearAllCleared={() => clearAllCleared("chore")} />
      )}
      {view === "shop" && (
        <ShoppingView shop={shop} favorites={favorites}
          onToggle={toggleShopChecked} onEdit={setShopEditing} onClearChecked={clearCheckedShop}
          onAddFav={addFavoriteToList} onSaveFav={saveItemAsFavorite} onManageFavs={() => setFavManage(true)}
          onHistory={() => setHistoryView(true)} historyCount={purchases.length} />
      )}
      {view === "board" && (
        <Board members={fam.members} allEvents={allEvents} onDetail={setDetail} onAdd={(mId) => openNew(tk, mId)} />
      )}

      {/* floating add */}
      <button onClick={() => (view === "tasks" ? setTaskEditing("new") : view === "chores" ? setChoreEditing("new") : view === "shop" ? setShopEditing("new") : setAddChoosing(true))}
        className="fixed bottom-5 right-5 w-14 h-14 rounded-full bg-teal-700 text-white text-3xl leading-none shadow-lg active:scale-95 transition-transform"
        aria-label="Add">+</button>

      {/* "+ what?" chooser */}
      {addChoosing && (
        <Sheet onClose={() => setAddChoosing(false)} title="Add something">
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => { setAddChoosing(false); openNew(); }}
              className="rounded-2xl bg-white border border-slate-200 p-4 text-left active:bg-slate-50">
              <span className="block text-2xl pb-1">📅</span>
              <span className="block text-sm font-bold text-slate-800">Event</span>
              <span className="block text-[11px] text-slate-500">Something happening on a day — practice, appointment, party</span>
            </button>
            <button onClick={() => { setAddChoosing(false); setTaskEditing("new"); }}
              className="rounded-2xl bg-white border border-slate-200 p-4 text-left active:bg-slate-50">
              <span className="block text-2xl pb-1">✅</span>
              <span className="block text-sm font-bold text-slate-800">Task</span>
              <span className="block text-[11px] text-slate-500">Something to get done — with a due date and who's responsible</span>
            </button>
            <button onClick={() => { setAddChoosing(false); setChoreEditing("new"); }}
              className="rounded-2xl bg-white border border-slate-200 p-4 text-left active:bg-slate-50">
              <span className="block text-2xl pb-1">🔄</span>
              <span className="block text-sm font-bold text-slate-800">Chore</span>
              <span className="block text-[11px] text-slate-500">A recurring job — rotating between people or one person's task</span>
            </button>
          </div>
        </Sheet>
      )}

      {/* day sheet */}
      {selectedDay && !editing && !detail && !taskEditing && !addChoosing && !famEditing && (
        <DaySheet dayKey={selectedDay} allEvents={allEvents} memberById={memberById} colorOf={colorOf} bgOf={bgOf}
          onClose={() => setSelectedDay(null)} onDetail={setDetail} onAdd={() => openNew(selectedDay)} />
      )}

      {/* event detail */}
      {detail && !editing && (
        <EventDetail ev={detail} memberById={memberById} colorOf={colorOf} bgOf={bgOf}
          onClose={() => setDetail(null)} onEdit={() => setEditing(detail)} onDelete={() => deleteEvent(detail.id)}
          onMarkDoneAndClear={(ev) => { markEventDoneAndClear(ev); setDetail(null); }} />
      )}

      {/* event editor */}
      {editing && (
        <EventEditor
          key={editing.__new ? "new" : editing.id}
          initial={editing.__new
            ? { id: uid(), title: "", date: selectedDay || tk, endDate: "", time: "", notes: "", phone: "", location: "", recur: "none", visibility: "family", memberIds: [editing.presetMember || me || fam.members[0].id] }
            : { visibility: "family", phone: "", location: "", recur: "none", endDate: "", ...editing, date: editing.seriesDate || editing.date, memberIds: peopleOf(editing) }}
          isNew={!!editing.__new}
          members={fam.members}
          onSave={saveEvent} onDelete={deleteEvent} onClose={() => setEditing(null)}
        />
      )}

      {/* task editor */}
      {taskEditing && (
        <TaskEditor
          key={taskEditing === "new" ? "new" : taskEditing.id}
          initial={taskEditing === "new"
            ? { id: uid(), title: "", dueDate: "", notes: "", done: false, memberIds: [me || fam.members[0].id] }
            : { ...taskEditing, memberIds: peopleOf(taskEditing) }}
          isNew={taskEditing === "new"}
          members={fam.members}
          onSave={saveTask} onDelete={deleteTask} onClose={() => setTaskEditing(null)}
        />
      )}

      {/* chore editor */}
      {choreEditing && (
        <ChoreEditor
          key={choreEditing === "new" ? "new" : choreEditing.id}
          initial={choreEditing === "new"
            ? { id: uid(), title: "", cadence: "weekly", weekdays: [new Date().getDay()], monthDay: new Date().getDate(), memberIds: fam.members.slice(0, Math.min(2, fam.members.length)).map((m) => m.id) }
            : choreEditing}
          isNew={choreEditing === "new"}
          members={fam.members}
          onSave={saveChore} onDelete={deleteChore} onClose={() => setChoreEditing(null)}
        />
      )}

      {/* family settings */}
      {famEditing && (
        <FamilyEditor fam={fam} onSave={(f) => { saveFamily(f); setFamEditing(false); }} onClose={() => setFamEditing(false)} />
      )}

      {/* main menu (hamburger): who am I, notifications, family settings */}
      {menuOpen && (
        <Sheet onClose={() => setMenuOpen(false)} title="Menu">
          {/* who am I */}
          <div className="pb-4">
            <p className="text-[11px] font-bold uppercase tracking-wide text-slate-400 pb-2">I'm using this device as</p>
            <div className="flex flex-wrap gap-2">
              {fam.members.map((m) => (
                <button key={m.id} onClick={() => pickMe(m.id)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${me === m.id ? "border-slate-700 bg-white shadow-sm" : "border-transparent bg-slate-100 text-slate-600"}`}>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ background: m.color }} />
                  {m.name}{me === m.id ? " · me" : ""}
                </button>
              ))}
            </div>
            {!me && <p className="text-[11px] text-amber-600 pt-2">Pick who you are so notifications reach the right people.</p>}
          </div>

          {/* notifications */}
          <div className="py-4 border-t border-slate-100">
            <div className="flex items-center justify-between">
              <div>
                <p className="text-sm font-semibold text-slate-800">Notifications</p>
                <p className="text-[11px] text-slate-400">Get pinged when the family adds events, tasks, or chores.</p>
              </div>
              <button onClick={() => (notifOn ? disableNotifications() : enableNotifications())}
                className={`w-12 h-7 rounded-full transition-colors relative shrink-0 ${notifOn ? "bg-teal-600" : "bg-slate-300"}`}
                aria-label="Toggle notifications">
                <span className={`absolute top-0.5 w-6 h-6 rounded-full bg-white transition-all ${notifOn ? "left-[22px]" : "left-0.5"}`} />
              </button>
            </div>
            {!me && notifOn && <p className="text-[11px] text-amber-600 pt-2">Tip: pick who you are above so we don't notify you about your own additions.</p>}
          </div>

          {/* past events history */}
          <div className="py-4 border-t border-slate-100">
            <button onClick={() => { setMenuOpen(false); setPastEventsOpen(true); }}
              className="w-full flex items-center justify-between py-1 text-left">
              <span className="text-sm font-semibold text-slate-800">Past events</span>
              <span className="text-slate-400">›</span>
            </button>
            <p className="text-[11px] text-slate-400">Look back at events that have already happened.</p>
          </div>

          {/* family settings */}
          <div className="py-4 border-t border-slate-100">
            <button onClick={() => { setMenuOpen(false); setFamEditing(true); }}
              className="w-full flex items-center justify-between py-1 text-left">
              <span className="text-sm font-semibold text-slate-800">Family settings</span>
              <span className="text-slate-400">›</span>
            </button>
            <p className="text-[11px] text-slate-400">Family name, members, colours, passcode.</p>
          </div>

          <p className="text-[10px] text-slate-300 text-center pt-4">FamCal {APP_VERSION}</p>
        </Sheet>
      )}

      {/* past events history */}
      {pastEventsOpen && (
        <PastEvents allEvents={allEvents} clearedEvents={cleared.filter((h) => h.kind === "event")}
          memberById={memberById} bgOf={bgOf}
          onOpen={(ev) => { setPastEventsOpen(false); setDetail(ev); }}
          onDeleteEvent={deleteEvent} onDeleteCleared={deleteCleared}
          onClose={() => setPastEventsOpen(false)} />
      )}

      {/* shopping item editor */}
      {shopEditing && (
        <ShopItemEditor
          key={shopEditing === "new" ? "new" : shopEditing.id}
          initial={shopEditing === "new" ? { id: uid(), name: "", store: "", price: "", favId: null } : shopEditing}
          isNew={shopEditing === "new"}
          favorites={favorites}
          onAdd={addShopItem} onSave={editShopItem} onRemove={removeShopItem} onClose={() => setShopEditing(null)}
        />
      )}

      {/* favorites manager */}
      {favManage && (
        <FavoritesManager favorites={favorites} onAdd={addFavorite} onRemove={removeFavorite} onAddToList={addFavoriteToList} onClose={() => setFavManage(false)} />
      )}

      {/* purchase history */}
      {historyView && (
        <PurchaseHistory purchases={purchases} memberById={memberById} onDelete={deletePurchase} onClearAll={clearAllPurchases} onReadd={readdFromHistory} onClose={() => setHistoryView(false)} />
      )}

      {/* cleared history (tasks / events / chores) */}
      {clearedView && (
        <ClearedHistory kind={clearedView} items={cleared.filter((h) => h.kind === clearedView)}
          memberById={memberById} onDelete={deleteCleared} onClearAll={() => clearAllCleared(clearedView)} onClose={() => setClearedView(null)} />
      )}
    </Shell>
  );
}

function ConfigNotice() {
  return (
    <Shell>
      <div className="max-w-md mx-auto px-5 pt-16 text-center">
        <p className="text-4xl pb-3">🔧</p>
        <h1 className="text-xl font-bold text-slate-800 pb-2">Almost there — one setup step left</h1>
        <p className="text-sm text-slate-500">
          Open <span className="font-mono bg-slate-100 px-1 rounded">index.html</span> and paste your Supabase URL and anon key
          near the top where it says <span className="font-mono bg-slate-100 px-1 rounded">PASTE_YOUR_SUPABASE…</span>.
          The README has the full walkthrough.
        </p>
      </div>
    </Shell>
  );
}

function Lock({ familyName, passcode, onUnlock }) {
  const [val, setVal] = useState("");
  const [wrong, setWrong] = useState(false);
  const submit = () => { if (val === passcode) onUnlock(val); else { setWrong(true); setVal(""); } };
  return (
    <Shell>
      <div className="max-w-xs mx-auto px-5 pt-20 text-center">
        <p className="text-4xl pb-3">🔒</p>
        <h1 className="text-xl font-bold text-slate-800 pb-1">{familyName}</h1>
        <p className="text-sm text-slate-500 pb-5">Enter the family passcode</p>
        <input type="password" inputMode="numeric" value={val} autoFocus
          onChange={(e) => { setVal(e.target.value); setWrong(false); }}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          className="w-full text-center text-lg tracking-widest px-3 py-3 rounded-xl border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-teal-600" />
        {wrong && <p className="text-xs text-red-500 pt-2">That's not it — try again.</p>}
        <button onClick={submit} className="mt-4 w-full py-3 rounded-xl bg-teal-700 text-white text-sm font-semibold">Open calendar</button>
      </div>
    </Shell>
  );
}

// ============================================================
// SHEETS & VIEWS
// ============================================================
function DaySheet({ dayKey, allEvents, memberById, colorOf, bgOf, onClose, onDetail, onAdd }) {
  const evs = eventsMapForRange(allEvents, dayKey, dayKey)[dayKey] || [];
  return (
    <Sheet onClose={onClose} title={fmtLong(dayKey)}>
      {evs.length === 0 && <p className="text-sm text-slate-400 py-4 text-center">Nothing planned. Tap “Add an event” below.</p>}
      <ul className="space-y-2">
        {evs.map((ev) => (
          <li key={ev.id + ev.date}>
            <button onClick={() => onDetail(ev)} className="w-full text-left flex gap-3 items-start p-3 rounded-xl bg-white border border-slate-200 active:bg-slate-50">
              <span className="mt-1 w-3 h-3 rounded-full shrink-0" style={{ background: bgOf(ev) }} />
              <span className="flex-1 min-w-0">
                <span className="block font-semibold text-slate-800">
                  {ev.title}{ev.recur !== "none" && <RepeatBadge />}{ev.visibility === "private" && <PrivateBadge />}
                </span>
                <span className="block text-xs text-slate-500">
                  {[fmtTime(ev.time), peopleOf(ev).map((id) => (memberById[id]||{}).name).filter(Boolean).join(", ")].filter(Boolean).join(" · ") || "All day"}
                </span>
              </span>
            </button>
          </li>
        ))}
      </ul>
      <button onClick={onAdd} className="mt-4 w-full py-3 rounded-xl bg-teal-700 text-white font-semibold text-sm">Add an event</button>
    </Sheet>
  );
}

function EventDetail({ ev, memberById, colorOf, bgOf, onClose, onEdit, onDelete, onMarkDoneAndClear }) {
  const tel = digitsOf(ev.phone);
  return (
    <Sheet onClose={onClose} title="Event">
      <div className="rounded-2xl bg-white border border-slate-200 p-4" style={(() => { const bg = bgOf(ev); const g = bg.startsWith("linear-gradient"); return g ? { borderLeft: "5px solid transparent", borderImage: `${bg} 1` } : { borderLeft: `5px solid ${bg}` }; })()}>
        <h3 className="text-lg font-bold text-slate-800">
          {ev.title}{ev.visibility === "private" && <PrivateBadge />}
        </h3>
        <p className="text-sm text-slate-500 pt-0.5">
          {ev.endDate && ev.endDate > (ev.seriesDate || ev.date)
            ? `${fmtLong(ev.seriesDate || ev.date)} → ${fmtLong(ev.endDate)}`
            : `${fmtLong(ev.date)}${ev.time ? ` · ${fmtTime(ev.time)}` : " · All day"}`}
        </p>
        {ev.recur !== "none" && <p className="text-xs font-semibold text-teal-700 pt-1">🔁 {RECUR_LABELS[ev.recur]}</p>}
        <div className="flex flex-wrap gap-1.5 pt-3">
          {peopleOf(ev).map((id) => memberById[id] && (
            <span key={id} className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-100 text-xs font-semibold text-slate-700">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: memberById[id].color }} />
              {memberById[id].name}
            </span>
          ))}
        </div>
        {ev.location && <p className="text-sm text-slate-600 pt-3">📍 {ev.location}</p>}
        {ev.phone && <p className="text-sm text-slate-600 pt-1">📞 {ev.phone}</p>}
        {ev.notes && <p className="text-sm text-slate-600 pt-3 whitespace-pre-wrap">{ev.notes}</p>}
      </div>

      {/* quick actions: call / text / directions */}
      {(tel || ev.location) && (
        <div className="flex gap-2 pt-3">
          {tel && (
            <a href={`tel:${tel}`} className="flex-1 py-3 rounded-xl bg-white border border-slate-300 text-center text-sm font-semibold text-slate-700">📞 Call</a>
          )}
          {tel && (
            <a href={`sms:${tel}`} className="flex-1 py-3 rounded-xl bg-white border border-slate-300 text-center text-sm font-semibold text-slate-700">💬 Text</a>
          )}
          {ev.location && (
            <a href={`https://maps.google.com/?q=${encodeURIComponent(ev.location)}`} target="_blank" rel="noopener"
              className="flex-1 py-3 rounded-xl bg-white border border-slate-300 text-center text-sm font-semibold text-slate-700">🗺️ Directions</a>
          )}
        </div>
      )}

      {/* mark done / clear this occurrence */}
      {onMarkDoneAndClear && ev.visibility !== "private" && (
        <div className="pt-3">
          <button onClick={() => onMarkDoneAndClear(ev)}
            className="w-full py-3 rounded-xl bg-emerald-600 text-white text-sm font-semibold">
            Mark done{ev.recur && ev.recur !== "none" ? " (returns next time)" : ""}
          </button>
          <p className="text-[11px] text-slate-400 text-center pt-1.5">Marks it done and files it under Past events.</p>
        </div>
      )}

      <div className="flex gap-2 pt-3">
        <button onClick={onDelete} className="px-4 py-3 rounded-xl bg-red-50 text-red-600 text-sm font-semibold">
          Delete{ev.recur !== "none" ? " series" : ""}
        </button>
        <button onClick={onEdit} className="flex-1 py-3 rounded-xl bg-teal-700 text-white text-sm font-semibold">
          Edit{ev.recur !== "none" ? " series" : " event"}
        </button>
      </div>
    </Sheet>
  );
}

function MonthGrid({ cursor, setCursor, allEvents, colorOf, bgOf, onPickDay, onDetail }) {
  const first = new Date(cursor.y, cursor.m, 1);
  const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
  const startK = toKey(first), endK = toKey(new Date(cursor.y, cursor.m, daysInMonth));
  const map = eventsMapForRange(allEvents, startK, endK);
  const lead = first.getDay();
  const cells = [];
  for (let i = 0; i < lead; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(cursor.y, cursor.m, d));
  const tk = todayKey();
  const move = (dir) => setCursor(({ y, m }) => { const n = new Date(y, m + dir, 1); return { y: n.getFullYear(), m: n.getMonth() }; });

  return (
    <div className="px-2">
      <div className="flex justify-between items-center px-2 pb-2">
        <button onClick={() => move(-1)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">‹</button>
        <button onClick={() => setCursor(() => { const n = new Date(); return { y: n.getFullYear(), m: n.getMonth() }; })} className="text-xs font-semibold text-teal-700">Today</button>
        <button onClick={() => move(1)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">›</button>
      </div>
      <div className="grid grid-cols-7 text-center text-[11px] font-semibold text-slate-400 pb-1">
        {WEEKDAYS.map((w) => <div key={w}>{w}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-0.5">
        {cells.map((d, i) => {
          if (!d) return <div key={`x${i}`} />;
          const k = toKey(d);
          const evs = map[k] || [];
          const isToday = k === tk;
          return (
            <button key={k} onClick={() => onPickDay(k)}
              className={`min-h-[72px] rounded-lg border p-0.5 flex flex-col items-stretch text-left transition-colors ${isToday ? "border-teal-600 bg-teal-50/70" : "border-slate-200 bg-white"}`}>
              <span className={`self-center inline-flex items-center justify-center w-5 h-5 mt-0.5 rounded-full text-[11px] font-bold ${isToday ? "bg-teal-700 text-white" : "text-slate-600"}`}>
                {d.getDate()}
              </span>
              <span className="flex flex-col gap-0.5 pt-0.5 overflow-hidden">
                {evs.slice(0,2).map((ev) => {
                  const span = ev._span;
                  const isSpan = span && span !== "single";
                  // continuous look: square the joined edges, show title only at the start (or week start)
                  const roundCls = !isSpan ? "rounded"
                    : span === "start" ? "rounded-l"
                    : span === "end" ? "rounded-r"
                    : "";
                  const marginCls = !isSpan ? "" : span === "start" ? "-mr-0.5" : span === "end" ? "-ml-0.5" : "-mx-0.5";
                  const showTitle = !isSpan || span === "start" || d.getDay() === 0; // start day or start of a week row
                  return (
                    <span key={ev.id + ev.date}
                      onClick={(e) => { e.stopPropagation(); onDetail(ev); }}
                      className={`block ${roundCls} ${marginCls} px-0.5 py-px text-[8.5px] leading-tight font-semibold text-white truncate`}
                      style={{ background: bgOf(ev) }}>
                      {showTitle ? ev.title : "\u00A0"}
                    </span>
                  );
                })}
                {evs.length > 2 && <span className="text-[9px] font-semibold text-slate-400 pl-0.5">+{evs.length - 2} more</span>}
              </span>
            </button>
          );
        })}
      </div>
      <p className="text-[11px] text-slate-400 text-center pt-2">Tap an event for details, or a day to see everything on it.</p>
    </div>
  );
}

function WeekView({ weekAnchor, setWeekAnchor, allEvents, colorOf, bgOf, onPick, onDetail }) {
  const start = parseKey(weekAnchor);
  const days = Array.from({ length: 7 }, (_, i) => toKey(addDays(start, i)));
  const map = eventsMapForRange(allEvents, days[0], days[6]);
  const tk = todayKey();
  const move = (n) => setWeekAnchor(toKey(addDays(start, n)));

  return (
    <div className="px-3">
      <div className="flex justify-between items-center px-1 pb-3">
        <button onClick={() => move(-7)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">‹</button>
        <div className="text-center">
          <span className="block text-sm font-bold text-slate-700">{fmtShort(days[0])} – {fmtShort(days[6])}</span>
          <button onClick={() => setWeekAnchor(toKey(startOfWeek(new Date())))} className="text-xs font-semibold text-teal-700">This week</button>
        </div>
        <button onClick={() => move(7)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">›</button>
      </div>
      <div className="space-y-1.5">
        {days.map((k) => {
          const d = parseKey(k);
          const evs = map[k] || [];
          const isToday = k === tk;
          return (
            <div key={k} className={`flex gap-3 rounded-2xl border p-2.5 ${isToday ? "border-teal-600 bg-teal-50/60" : "border-slate-200 bg-white"}`}>
              <button onClick={() => onPick(k)} className="w-12 shrink-0 text-center pt-0.5">
                <span className={`block text-[10px] font-bold uppercase ${isToday ? "text-teal-700" : "text-slate-400"}`}>{WEEKDAYS[d.getDay()]}</span>
                <span className={`inline-flex items-center justify-center w-8 h-8 rounded-full text-sm font-bold ${isToday ? "bg-teal-700 text-white" : "text-slate-700"}`}>{d.getDate()}</span>
              </button>
              <div className="flex-1 min-w-0 py-0.5">
                {evs.length === 0 ? (
                  <button onClick={() => onPick(k)} className="text-xs text-slate-300 pt-2">—</button>
                ) : (
                  <ul className="space-y-1">
                    {evs.map((ev) => (
                      <li key={ev.id + ev.date}>
                        <button onClick={() => onDetail(ev)} className="w-full flex items-center gap-2 text-left rounded-lg px-2 py-1.5 active:bg-slate-100">
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: bgOf(ev) }} />
                          <span className="flex-1 text-sm font-medium text-slate-800 truncate">
                            {ev.title}{ev.recur !== "none" && <RepeatBadge />}{ev.visibility === "private" && <PrivateBadge />}
                          </span>
                          <span className="text-[11px] text-slate-500 shrink-0">{fmtTime(ev.time)}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DayView({ dayAnchor, setDayAnchor, allEvents, memberById, colorOf, bgOf, onDetail, onAdd }) {
  const tk = todayKey();
  const d = parseKey(dayAnchor);
  const evs = eventsMapForRange(allEvents, dayAnchor, dayAnchor)[dayAnchor] || [];
  const timed = evs.filter((e) => e.time);
  const allDay = evs.filter((e) => !e.time);
  const move = (n) => setDayAnchor(toKey(addDays(d, n)));

  return (
    <div className="px-4">
      <div className="flex justify-between items-center pb-3">
        <button onClick={() => move(-1)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">‹</button>
        <div className="text-center">
          <span className="block text-sm font-bold text-slate-700">{dayAnchor === tk ? `Today · ${fmtDayOrdinal(dayAnchor)}` : fmtDayOrdinal(dayAnchor)}</span>
          {dayAnchor !== tk && <button onClick={() => setDayAnchor(tk)} className="text-xs font-semibold text-teal-700">Back to today</button>}
        </div>
        <button onClick={() => move(1)} className="px-3 py-1.5 rounded-lg text-slate-500 bg-slate-100 text-sm font-semibold">›</button>
      </div>

      {evs.length === 0 && <p className="text-sm text-slate-400 text-center py-10">Nothing planned for this day.</p>}

      {allDay.length > 0 && (
        <div className="pb-3">
          <p className="text-[11px] font-bold uppercase tracking-wide text-slate-400 pb-1.5">All day</p>
          <div className="space-y-1.5">
            {allDay.map((ev) => <DayCard key={ev.id + ev.date} ev={ev} memberById={memberById} colorOf={colorOf} bgOf={bgOf} onDetail={onDetail} />)}
          </div>
        </div>
      )}

      {timed.length > 0 && (
        <div className="space-y-1.5">
          {allDay.length > 0 && <p className="text-[11px] font-bold uppercase tracking-wide text-slate-400 pb-0.5">Scheduled</p>}
          {timed.map((ev) => (
            <div key={ev.id + ev.date} className="flex gap-3 items-start">
              <span className="w-16 shrink-0 text-right text-xs font-bold text-slate-500 pt-3">{fmtTime(ev.time)}</span>
              <div className="flex-1"><DayCard ev={ev} memberById={memberById} colorOf={colorOf} bgOf={bgOf} onDetail={onDetail} /></div>
            </div>
          ))}
        </div>
      )}

      <button onClick={onAdd} className="mt-4 w-full py-3 rounded-xl bg-teal-700 text-white font-semibold text-sm">Add an event on this day</button>
    </div>
  );
}

function DayCard({ ev, memberById, colorOf, bgOf, onDetail }) {
  const bg = bgOf(ev);
  const isGrad = bg.startsWith("linear-gradient");
  return (
    <button onClick={() => onDetail(ev)} className="w-full text-left rounded-xl bg-white border border-slate-200 p-3 active:bg-slate-50 relative overflow-hidden"
      style={{ borderLeft: `4px solid ${isGrad ? "transparent" : bg}`, ...(isGrad ? { borderImage: `${bg} 1` } : {}) }}>
      <span className="block text-sm font-semibold text-slate-800">
        {ev.title}{ev.recur !== "none" && <RepeatBadge />}{ev.visibility === "private" && <PrivateBadge />}
      </span>
      <span className="flex flex-wrap gap-1 pt-1">
        {peopleOf(ev).map((id) => memberById[id] && (
          <span key={id} className="flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-slate-100 text-[10px] font-semibold text-slate-600">
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: memberById[id].color }} />
            {memberById[id].name}
          </span>
        ))}
      </span>
      {(ev.location || ev.phone) && (
        <span className="block text-xs text-slate-400 pt-1 truncate">{[ev.location && `📍 ${ev.location}`, ev.phone && `📞 ${ev.phone}`].filter(Boolean).join("  ")}</span>
      )}
    </button>
  );
}

function Board({ members, allEvents, onDetail, onAdd }) {
  const [range, setRange] = useState("30");
  const tk = todayKey();
  const horizon = toKey(addDays(new Date(), Number(range)));
  const map = eventsMapForRange(allEvents, tk, horizon);
  const flat = Object.values(map).flat();
  const upcoming = (mId) =>
    flat.filter((e) => peopleOf(e).includes(mId))
      .sort((a,b) => (a.date === b.date ? ((a.time||"99") < (b.time||"99") ? -1 : 1) : a.date < b.date ? -1 : 1));

  return (
    <div className="pb-24">
      <div className="px-4 pb-3">
        <div className="flex rounded-full bg-slate-200 p-0.5 text-xs font-semibold w-fit">
          {[["7","1 week"],["30","30 days"],["60","60 days"]].map(([v,label]) => (
            <button key={v} onClick={() => setRange(v)}
              className={`px-3.5 py-1.5 rounded-full transition-colors ${range === v ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>
              {label}
            </button>
          ))}
        </div>
      </div>
      <div className="overflow-x-auto">
        <div className="flex gap-3 px-4 min-w-max items-start">
          {members.map((m) => {
            const evs = upcoming(m.id);
            return (
              <div key={m.id} className="w-60 shrink-0 rounded-2xl bg-slate-100 p-2.5">
                <div className="flex items-center gap-2 px-1 pb-2">
                  <span className="w-3 h-3 rounded-full" style={{ background: m.color }} />
                  <span className="flex-1 font-bold text-sm text-slate-800">{m.name}</span>
                  <span className="text-xs font-semibold text-slate-400">{evs.length}</span>
                </div>
                <div className="space-y-1.5">
                  {evs.length === 0 && <p className="text-xs text-slate-400 text-center py-4">Nothing in this range</p>}
                  {evs.map((ev) => (
                    <button key={ev.id + ev.date} onClick={() => onDetail(ev)}
                      className="w-full text-left rounded-xl bg-white border border-slate-200 p-2.5 active:bg-slate-50"
                      style={{ borderLeft: `4px solid ${m.color}` }}>
                      <span className="block text-sm font-semibold text-slate-800 truncate">
                        {ev.title}{ev.recur !== "none" && <RepeatBadge />}{ev.visibility === "private" && <PrivateBadge />}
                      </span>
                      <span className="block text-[11px] text-slate-500">
                        {ev.date === tk ? "Today" : fmtShort(ev.date)}{ev.time ? ` · ${fmtTime(ev.time)}` : ""}
                        {peopleOf(ev).length > 1 ? ` · ${peopleOf(ev).length} people` : ""}
                      </span>
                    </button>
                  ))}
                </div>
                <button onClick={() => onAdd(m.id)} className="mt-2 w-full py-2 rounded-xl text-xs font-semibold text-teal-700 bg-white border border-dashed border-slate-300">
                  + Add for {m.name}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const cols = personColumns(members || [], me, (mId) => openTasks.filter((t) => peopleOf(t).includes(mId)));
  const layoutToggle = (

      <span onClick={(e) => { e.stopPropagation(); onSetLayout("stacked"); }} className={`px-2 py-0.5 rounded-full ${layout !== "columns" ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>Stacked</span>
      <span onClick={(e) => { e.stopPropagation(); onSetLayout("columns"); }} className={`px-2 py-0.5 rounded-full ${layout === "columns" ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>Columns</span>

        <span className="w-2.5 h-2.5 rounded-full" style={{ background: member.color }} />
        <span className="flex-1 font-bold text-xs text-slate-800">{member.name}{isMe ? " · me" : ""}</span>
        <span className="text-[11px] font-semibold text-slate-400">{items.length}</span>
      </div>
      <div className="rounded-xl bg-white border border-slate-200 divide-y divide-slate-100 px-2">

          <TaskRow key={t.id} t={t} memberById={memberById} onToggle={onToggle} onEdit={onEdit} compact />

    <div className="px-4 pt-4 pb-2">
      <Collapsible storeKey="famcal:collapse:tasks" count={openTasks.length}
        title={<span className="flex items-center gap-2 flex-wrap">Tasks
          <span onClick={(e) => { e.stopPropagation(); onOpenAll(); }} className="text-teal-700 font-semibold normal-case tracking-normal">View all ›</span>
          {openTasks.length > 0 && layoutToggle}
        </span>}>
        {openTasks.length === 0 ? (
          <div className="rounded-2xl bg-white border border-slate-200 p-3.5">
            <p className="text-xs text-slate-400 text-center py-3">All caught up — nothing on the list. 🎉</p>
          </div>
        ) : layout === "columns" ? (
          <div className="overflow-x-auto -mx-1 px-1">
            <div className="flex gap-2.5 min-w-max items-start">
              {cols.map((c) => personBlock(c))}
            </div>
          </div>
        ) : (
          <div>{cols.map((c) => personBlock(c))}</div>
        )}
      </Collapsible>
    </div>
  );
}

function ChoreSummary({ chores, memberById, members, me, layout, onSetLayout, onComplete, onClear, onOpenAll, onEdit }) {
  if (!chores || chores.length === 0) return null;
  const cols = personColumns(members || [], me, (mId) => chores.filter((c) => whoseTurn(c) === mId));
  const choreItem = (c) => {
    const turnId = whoseTurn(c);
    const turn = memberById[turnId];
    const done = choreDoneThisPeriod(c);
    const solo = (c.memberIds || []).length === 1;
    return (
      <li key={c.id} className="flex items-center gap-2.5 py-2">
        <button onClick={() => onComplete(c.id)} aria-label={done ? "Undo" : "Mark done"}
          className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center shrink-0 transition-colors ${done ? "bg-teal-700 border-teal-700 text-white" : "border-slate-300 bg-white"}`}>
          {done && <span className="text-xs font-bold">✓</span>}
        </button>
        <button onClick={() => onEdit(c)} className="flex-1 min-w-0 text-left">
          <span className={`block text-sm font-semibold truncate ${done ? "line-through text-slate-400" : "text-slate-800"}`}>{c.title}</span>
          <span className="block text-[11px] text-slate-400">
            {done ? `Done this ${c.cadence === "daily" ? "day" : "week"} ✓` : (solo ? cadenceLabel(c) : `${turn ? turn.name + "'s turn" : "—"}`)}
          </span>
        </button>
        {done && (
          <button onClick={() => onClear(c.id)} className="shrink-0 px-2 py-1 rounded-lg bg-emerald-600 text-white text-[11px] font-bold">Clear</button>
        )}
      </li>
    );
  };
  const layoutToggle = (
    <span className="flex rounded-full bg-slate-200 p-0.5 text-[10px] font-semibold normal-case tracking-normal">
      <span onClick={(e) => { e.stopPropagation(); onSetLayout("stacked"); }} className={`px-2 py-0.5 rounded-full ${layout !== "columns" ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>Stacked</span>
      <span onClick={(e) => { e.stopPropagation(); onSetLayout("columns"); }} className={`px-2 py-0.5 rounded-full ${layout === "columns" ? "bg-white text-slate-800 shadow-sm" : "text-slate-500"}`}>Columns</span>
    </span>
  );
  const personBlock = ({ member, items, isMe }) => (
    <div key={member.id} className={layout === "columns" ? "w-56 shrink-0 rounded-2xl bg-slate-100 p-2" : "rounded-2xl bg-slate-100 p-2 mb-2"}>
      <div className="flex items-center gap-2 px-1 pb-1.5">
        <span className="w-2.5 h-2.5 rounded-full" style={{ background: member.color }} />
        <span className="flex-1 font-bold text-xs text-slate-800">{member.name}{isMe ? " · me" : ""}</span>
        <span className="text-[11px] font-semibold text-slate-400">{items.length}</span>
      </div>
      <div className="rounded-xl bg-white border border-slate-200 divide-y divide-slate-100 px-2">
        {items.slice(0,6).map((c) => choreItem(c))}
      </div>
    </div>
  );
  return (
    <div className="px-4 pt-1 pb-2">
      <Collapsible storeKey="famcal:collapse:chores" count={chores.length}
        title={<span className="flex items-center gap-2 flex-wrap">Chores
          <span onClick={(e) => { e.stopPropagation(); onOpenAll(); }} className="text-teal-700 font-semibold normal-case tracking-normal">View all ›</span>
          {layoutToggle}
        </span>}>
        {layout === "columns" ? (
          <div className="overflow-x-auto -mx-1 px-1">
            <div className="flex gap-2.5 min-w-max items-start">
              {cols.map((c) => personBlock(c))}
            </div>
          </div>
        ) : (
          <div>{cols.map((c) => personBlock(c))}</div>
        )}
      </Collapsible>
    </div>
  );
}

function ShopSummary({ shop, onOpenAll, onToggle }) {
  if (!shop || shop.length === 0) return null;
  const unchecked = shop.filter((s) => !s.checked);
  const show = shop.slice(0, 6);
  return (
    <div className="px-4 pt-1 pb-2">
      <Collapsible storeKey="famcal:collapse:shop" count={unchecked.length}
        title={<span className="flex items-center gap-2">Shopping
          <span onClick={(e) => { e.stopPropagation(); onOpenAll(); }} className="text-teal-700 font-semibold normal-case tracking-normal">View all ›</span>
        </span>}>
        <div className="rounded-2xl bg-white border border-slate-200 p-3.5">
          <ul className="divide-y divide-slate-100">
            {show.map((s) => (
              <li key={s.id} className="flex items-center gap-3 py-2">
                <button onClick={() => onToggle(s.id)} aria-label={s.checked ? "Uncheck" : "Check"}
                  className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center shrink-0 transition-colors ${s.checked ? "bg-teal-700 border-teal-700 text-white" : "border-slate-300 bg-white"}`}>
                  {s.checked && <span className="text-xs font-bold">✓</span>}
                </button>
                <span className={`flex-1 min-w-0 text-sm font-semibold truncate ${s.checked ? "line-through text-slate-400" : "text-slate-800"}`}>{s.name}</span>
              </li>
            ))}
          </ul>
          {shop.length > 6 && (
            <button onClick={onOpenAll} className="mt-2 w-full text-center text-xs font-semibold text-teal-700">
              +{shop.length - 6} more — view all
            </button>
          )}
        </div>
      </Collapsible>
    </div>
  );
}

function TasksView({ openTasks, doneTasks, memberById, members, me, onToggle, onEdit, onClear, onHistory, historyCount }) {
  const tk = todayKey();
  const overdue = openTasks.filter((t) => t.dueDate && t.dueDate < tk);
  const today = openTasks.filter((t) => t.dueDate === tk);
  const upcoming = openTasks.filter((t) => t.dueDate && t.dueDate > tk);
